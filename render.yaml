services:
  - type: web
    name: shopify-announcement-app
    runtime: node
    rootDir: web
    buildCommand: npm install --legacy-peer-deps && cd ../client && npm install && npm run build
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_APP_URL
        sync: false
      - key: SCOPES
        value: write_metafields,read_metafields,read_themes
      - key: MONGODB_URI
        sync: false
      - key: SHOP
        sync: false
      - key: SHOPIFY_ACCESS_TOKEN
        sync: false
      - key: SESSION_SECRET
        sync: false
    healthCheckPath: /health
    plan: free
